spring:
  application:
    name: benchmarking
  config:
    import: "optional:classpath:configs/execution-matrix.yaml,optional:classpath:configs/dataset-catalog.yaml"
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/benchmarking}
    username: ${DB_USERNAME:benchmarking}
    password: ${DB_PASSWORD:benchmarking}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
server:
  port: 8081
benchmark:
  execution:
    max-concurrency: 6
    max-retries: 1
    task-timeout-ms: 60000
    circuit-breaker-failure-threshold: 3
    circuit-breaker-open-ms: 60000
    retry-backoff-ms: 5000
    worker-batch-size: 6
    claim-window-size: 100
    stale-running-task-grace-ms: 30000
    worker-poll-interval-ms: 1000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
